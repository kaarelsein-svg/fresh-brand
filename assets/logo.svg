<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100">
  <defs>
    <style>
      .letter { fill: none; stroke: currentColor; stroke-width: 3; stroke-linecap: square; stroke-linejoin: miter; }
      .dot { fill: currentColor; }
    </style>
  </defs>
  <g transform="translate(10, 10)">
    <!-- F -->
    <g class="letter">
      <line x1="0" y1="0" x2="0" y2="72"/>
      <line x1="0" y1="0" x2="45" y2="0"/>
      <line x1="0" y1="36" x2="35" y2="36"/>
    </g>
    <!-- R -->
    <g class="letter" transform="translate(65, 0)">
      <line x1="0" y1="0" x2="0" y2="72"/>
      <line x1="0" y1="0" x2="30" y2="0"/>
      <path d="M30,0 Q48,0 48,18 Q48,36 30,36" fill="none"/>
      <line x1="0" y1="36" x2="30" y2="36"/>
      <line x1="28" y1="36" x2="48" y2="72"/>
    </g>
    <!-- E -->
    <g class="letter" transform="translate(133, 0)">
      <line x1="0" y1="0" x2="0" y2="72"/>
      <line x1="0" y1="0" x2="42" y2="0"/>
      <line x1="0" y1="36" x2="35" y2="36"/>
      <line x1="0" y1="72" x2="42" y2="72"/>
    </g>
    <!-- S -->
    <g class="letter" transform="translate(195, 0)">
      <path d="M42,8 Q42,0 30,0 L12,0 Q0,0 0,12 L0,24 Q0,36 12,36 L30,36 Q42,36 42,48 L42,60 Q42,72 30,72 L12,72 Q0,72 0,64" fill="none"/>
    </g>
    <!-- H -->
    <g class="letter" transform="translate(255, 0)">
      <line x1="0" y1="0" x2="0" y2="72"/>
      <line x1="46" y1="0" x2="46" y2="72"/>
      <line x1="0" y1="36" x2="46" y2="36"/>
    </g>
    <!-- dot -->
    <rect class="dot" x="322" y="60" width="12" height="12" rx="1"/>
  </g>
  <!-- scan line accent -->
  <line x1="0" y1="96" x2="520" y2="96" stroke="currentColor" stroke-width="1" opacity="0.25"/>
</svg>
